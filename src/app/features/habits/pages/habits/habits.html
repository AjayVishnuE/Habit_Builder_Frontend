<button mat-raised-button color="primary" (click)="openAddHabitDialog()">
    + Add Habit
</button>
<hr>
@for (habit of habits; track habit._id) {
    <app-habit-card
        [habit]="habit"
        (delete)="deleteHabit($event)"
        (edit)="editHabit($event)"
        (complete)="completeHabit($event)">
    </app-habit-card>
}
