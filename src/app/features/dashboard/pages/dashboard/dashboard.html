<div class="row">
    <div class="col-md-4">
        <app-stat-card title="Total Habits" [value]="totalHabits" icon="📚"> </app-stat-card>
    </div>
    <div class="col-md-4">
        <app-stat-card title="Completed Today" [value]="completedToday" icon="✅"> </app-stat-card>
    </div>
    <div class="col-md-4">
        <app-stat-card title="Current Streak" [value]="currentStreak" icon="🔥"> </app-stat-card>
    </div>
</div>
<div class="card shadow-sm mt-4 p-4">
    <h4 class="mb-4">Weekly Progress</h4>
    <canvas
        baseChart
        [data]="barChartData"
        [options]="barChartOptions"
        [type]="barChartType">
    </canvas>
</div>
