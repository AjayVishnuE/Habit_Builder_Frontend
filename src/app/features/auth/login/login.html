<div class="container mt-5" style="max-width: 400px;">
    <h2>Login</h2>
    <input
        class="form-control mb-3"
        type="email"
        placeholder="Email"
        [(ngModel)]="email">
    <input
        class="form-control mb-3"
        type="password"
        placeholder="Password"
        [(ngModel)]="password">
    <button
        class="btn btn-primary w-100"
        (click)="login()">
        Login
    </button> 
</div>
